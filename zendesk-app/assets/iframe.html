<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Ticket Copilot</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="topbar__brand">
          <p class="topbar__eyebrow">AI Ticket Copilot</p>
          <div class="topbar__title-row">
            <h1>Copilot</h1>
            <span id="mode-badge" class="mode-badge mode-badge--preview">Preview</span>
          </div>
        </div>
        <button id="refresh-context" class="toolbar-button" type="button">Refresh</button>
      </header>

      <section class="shortcut-panel" aria-label="Shortcut actions">
        <button class="shortcut" data-shortcut="summarize" type="button">Summarize</button>
        <button class="shortcut" data-shortcut="draft_reply" type="button">Draft reply</button>
        <button class="shortcut" data-shortcut="next_steps" type="button">Next steps</button>
      </section>

      <section id="status" class="status status--neutral" aria-live="polite">
        <span class="status__dot" aria-hidden="true"></span>
        <span id="status-text">Loading ticket context...</span>
      </section>

      <section id="messages" class="messages" aria-live="polite">
        <div class="empty-state">
          <p class="empty-state__eyebrow">AI Output</p>
          <h2>Ready when you are</h2>
          <p>Ask Copilot about the current ticket or use a shortcut when AI is connected.</p>
        </div>
      </section>

      <form id="composer" class="composer">
        <div class="composer__header">
          <label class="composer__label" for="prompt">Ask Copilot</label>
          <p class="composer__hint">Context from the ticket is attached automatically.</p>
        </div>

        <div class="composer__shell">
          <textarea
            id="prompt"
            name="prompt"
            rows="4"
            placeholder='Ask a question or try a prompt like "draft a calm reply that asks for the order number."'
          ></textarea>

          <div class="composer__actions">
            <button id="send" class="button button--primary" type="submit">Send</button>
          </div>
        </div>
      </form>
    </main>

    <script src="https://static.zdassets.com/zendesk_app_framework_sdk/2.0/zaf_sdk.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
